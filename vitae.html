<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kha Le — Vitae</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Source Serif 4"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          colors: {
            accent: '#2563eb',
            accentDark: '#1d4ed8',
            muted: '#6b7280',
            border: '#e5e7eb',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; color: #1f2937; }
    h1, h2, h3 { font-family: 'Source Serif 4', Georgia, serif; }
    .nav-link { position: relative; }
    .nav-link.active::after {
      content: '';
      position: absolute;
      left: 0; bottom: -4px;
      width: 100%;
      height: 2px;
      background: #2563eb;
    }
    @media print {
      nav, footer { display: none; }
      body { font-size: 11pt; }
    }
  </style>
</head>

<body class="bg-white text-gray-800 antialiased">

  <!-- ═══ NAVIGATION ═══ -->
  <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-3xl mx-auto flex items-center justify-between px-6 py-4">
      <a href="index.html" class="font-serif text-xl font-semibold tracking-tight text-gray-900 hover:text-accent transition">Kha Le</a>
      <div class="flex gap-6 text-sm font-medium text-gray-600">
        <a href="index.html"    class="nav-link hover:text-accent transition">About</a>
        <a href="projects.html" class="nav-link hover:text-accent transition">Projects</a>
        <a href="vitae.html"    class="nav-link active hover:text-accent transition">Vitae</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-12 md:py-20">

    <div class="text-center space-y-6">
      <h1 class="text-4xl font-bold tracking-tight text-gray-900">Curriculum Vitae</h1>
      <p class="text-base text-gray-600 max-w-md mx-auto">
        A summary of my education, research experience, publications, grants, and skills.
      </p>

      <!--
      ╔══════════════════════════════════════════════════════════════════╗
      ║  HOW TO UPDATE YOUR CV                                          ║
      ║                                                                 ║
      ║  1. Place your new CV file in this same folder and name it      ║
      ║     "cv.pdf" (replacing the old one).                           ║
      ║                                                                 ║
      ║  2. That's it! The download button below already points to      ║
      ║     "cv.pdf", so it will automatically serve the new file.      ║
      ║                                                                 ║
      ║  3. Update the "Last updated" date below to keep it current.    ║
      ╚══════════════════════════════════════════════════════════════════╝
      -->

      <!-- Download Button -->
      <div class="pt-4">
        <a
          href="cv.pdf"
          target="_blank"
          class="inline-flex items-center gap-2.5 px-8 py-3.5 bg-accent hover:bg-accentDark text-white text-sm font-medium rounded-lg shadow-sm hover:shadow transition-all"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          Download Curriculum Vitae
        </a>
      </div>

      <!-- Last Updated -->
      <p class="text-xs text-muted pt-2">
        <!-- ▸ Change the date below whenever you upload a new CV ◂ -->
        Last updated: April 2026
      </p>
    </div>

    <!-- ── Optional: embedded CV preview ── -->
    <div class="mt-16 border border-gray-200 rounded-lg overflow-hidden">
      <!--
      ╔══════════════════════════════════════════════════════════════════╗
      ║  EMBEDDED CV PREVIEW                                            ║
      ║                                                                 ║
      ║  The <iframe> below shows a live preview of your CV.            ║
      ║  If the PDF doesn't render in some browsers, that's fine —      ║
      ║  the download button above is the primary access method.        ║
      ║                                                                 ║
      ║  To disable this preview, simply delete or comment out the      ║
      ║  <iframe> tag below.                                            ║
      ╚══════════════════════════════════════════════════════════════════╝
      -->
      <iframe
        src="cv.pdf"
        class="w-full"
        style="height: 800px;"
        title="Curriculum Vitae preview"
      >
        <p class="p-8 text-sm text-gray-500">Your browser does not support embedded PDFs. Please use the download button above.</p>
      </iframe>
    </div>

  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="border-t border-gray-100 mt-12">
    <div class="max-w-3xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-muted">
      <span>&copy; 2025 Kha Le. All rights reserved.</span>
      <div class="flex gap-4">
        <a href="mailto:khale.ngoc28@gmail.com" class="hover:text-accent transition">Email</a>
      </div>
    </div>
  </footer>

</body>
</html>
